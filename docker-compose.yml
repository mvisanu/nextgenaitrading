services:
  db:
    image: postgres:16-alpine
    container_name: nextgenstock-db
    environment:
      POSTGRES_USER: nextgen
      POSTGRES_PASSWORD: nextgen
      POSTGRES_DB: nextgenstock
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextgen -d nextgenstock"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
